<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>PREP Study Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F6F2; --surface: #FFFFFF; --surface2: #F0EFE9;
    --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.2);
    --text: #1A1A18; --muted: #7A7970; --faint: #B0AFA7;
    --green: #1D9E75; --green-bg: #EAF3DE; --green-text: #3B6D11; --green-border: #97C459;
    --blue-bg: #E6F1FB; --blue-text: #185FA5; --blue-border: #85B7EB;
    --radius: 10px; --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1A1A18; --surface: #242422; --surface2: #2E2E2B;
      --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.2);
      --text: #F0EFE9; --muted: #8A8980; --faint: #5A5950;
      --green-bg: #1A2E1A; --green-text: #7DC85A; --green-border: #3B6D11;
      --blue-bg: #0D1F33; --blue-text: #5BA3E8; --blue-border: #185FA5;
    }
  }
  html { -webkit-text-size-adjust: 100%; }
  body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  #loginScreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .login-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 2.5rem 2rem; width: 100%; max-width: 400px; text-align: center; }
  .login-title { font-family: 'DM Mono', monospace; font-size: clamp(28px,8vw,42px); font-weight: 500; letter-spacing: clamp(4px,2vw,8px); margin-bottom: 8px; }
  .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 2rem; }
  .login-label { font-size: 12px; color: var(--muted); text-align: left; margin-bottom: 6px; display: block; }
  .login-input { width: 100%; padding: 12px 14px; font-size: 15px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); background: var(--surface2); color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; -webkit-appearance: none; margin-bottom: 12px; }
  .login-input:focus { border-color: var(--green); }
  .login-btn { width: 100%; padding: 13px; font-size: 15px; font-weight: 500; background: var(--green); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; font-family: 'DM Sans', sans-serif; -webkit-tap-highlight-color: transparent; min-height: 48px; }
  .login-btn:active { opacity: 0.85; }
  .login-error { font-size: 12px; color: #E24B4A; margin-top: 8px; min-height: 18px; }
  #mainApp { display: none; padding: 2rem 1rem; }
  .app { max-width: 860px; margin: 0 auto; }
  .sync-bar { display: flex; align-items: center; justify-content: space-between; gap: 7px; font-size: 12px; color: var(--muted); margin-bottom: 1rem; padding: 8px 14px; background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; }
  .sync-left { display: flex; align-items: center; gap: 7px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.synced { background: var(--green); }
  .sync-dot.syncing { background: #F0C040; animation: pulse 1s infinite; }
  .sync-dot.error { background: #E24B4A; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .switch-btn { font-size: 11px; color: var(--faint); background: none; border: 0.5px solid var(--border); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-family: 'DM Sans', sans-serif; -webkit-tap-highlight-color: transparent; white-space: nowrap; }
  .switch-btn:active { color: var(--green-text); border-color: var(--green-border); }
  .top-header { text-align: center; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 0.5px solid var(--border); }
  .top-header h1 { font-family: 'DM Mono', monospace; font-size: clamp(28px,10vw,48px); font-weight: 500; letter-spacing: clamp(4px,2vw,8px); line-height: 1; margin-bottom: 6px; }
  .top-header p { font-size: 13px; color: var(--muted); }
  .user-greeting { display: inline-block; margin-top: 8px; font-size: 13px; color: var(--green-text); background: var(--green-bg); border: 0.5px solid var(--green-border); border-radius: 20px; padding: 4px 14px; }
  .reset-btn { margin-top: 12px; font-size: 11px; color: var(--faint); background: none; border: 0.5px solid var(--border); border-radius: 6px; padding: 6px 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; -webkit-tap-highlight-color: transparent; min-height: 36px; }
  .reset-btn:active { color: #c0392b; border-color: #c0392b; }
  .global-stats { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 8px; margin-bottom: 1.5rem; }
  @media(min-width:500px){ .global-stats { grid-template-columns: repeat(4,minmax(0,1fr)); } }
  .stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
  .stat-value { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; }
  .year-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 8px; }
  .year-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; min-height: 56px; }
  .year-header:active { background: var(--surface2); }
  .year-left { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .year-title { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; }
  .year-qtotal { font-size: 11px; color: var(--muted); }
  .year-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .year-badge { font-size: 11px; padding: 4px 9px; border-radius: 6px; border: 0.5px solid var(--border); background: var(--surface2); color: var(--muted); font-family: 'DM Mono', monospace; white-space: nowrap; }
  .year-badge.done { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
  .year-badge.going { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); }
  .pbar-wrap { height: 3px; background: var(--surface2); }
  .pbar { height: 3px; background: var(--green); transition: width 0.4s cubic-bezier(.4,0,.2,1); }
  .chevron { font-size: 11px; color: var(--faint); transition: transform 0.2s; display: inline-block; }
  .chevron.open { transform: rotate(180deg); }
  .sessions-container { display: none; padding: 14px 16px 18px; }
  .sessions-container.open { display: block; }
  .sessions-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(130px,1fr)); gap: 7px; }
  @media(max-width:380px){ .sessions-grid { grid-template-columns: repeat(auto-fill,minmax(110px,1fr)); } }
  .session-item { display: flex; align-items: center; gap: 9px; padding: 12px 13px; border: 0.5px solid var(--border); border-radius: var(--radius); cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; background: var(--surface); min-height: 52px; }
  .session-item:active { background: var(--surface2); }
  .session-item.checked { background: var(--green-bg); border-color: var(--green-border); }
  .session-item.last-session { border-style: dashed; }
  .session-item.checked.last-session { border-style: dashed; border-color: var(--green-border); }
  .custom-check { width: 22px; height: 22px; border-radius: 5px; border: 1.5px solid var(--border-strong); background: var(--surface); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .session-item.checked .custom-check { background: var(--green); border-color: var(--green); }
  .check-icon { display: none; color: #fff; font-size: 13px; font-weight: 600; line-height: 1; }
  .session-item.checked .check-icon { display: block; }
  .session-label { font-size: 13px; line-height: 1.2; }
  .session-item.checked .session-label { color: var(--green-text); font-weight: 500; }
  .session-sub { font-size: 10px; color: var(--faint); display: block; margin-top: 2px; font-family: 'DM Mono', monospace; }
  .session-item.checked .session-sub { color: #639922; }
  .remainder-note { font-size: 11px; color: var(--faint); margin-top: 10px; font-style: italic; }
  #loadingOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 100; transition: opacity 0.3s; }
  #loadingOverlay.hidden { opacity: 0; pointer-events: none; }
  .loading-title { font-family: 'DM Mono', monospace; font-size: 28px; letter-spacing: 6px; }
  .loading-sub { font-size: 13px; color: var(--muted); }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loadingOverlay">
  <div class="loading-title">PREP</div>
  <div class="spinner"></div>
  <div class="loading-sub">Loading…</div>
</div>
<div id="loginScreen" style="display:none">
  <div class="login-card">
    <div class="login-title">PREP</div>
    <div class="login-sub">Study tracker · 2018–2025 · 10 q/session</div>
    <label class="login-label">Enter your name to access your progress</label>
    <input class="login-input" id="nameInput" type="text" placeholder="e.g. Albara" autocomplete="off" autocorrect="off" spellcheck="false" />
    <button class="login-btn" onclick="handleLogin()">Continue →</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>
<div id="mainApp">
  <div class="app">
    <div class="sync-bar">
      <div class="sync-left">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncText">Connecting…</span>
      </div>
      <button class="switch-btn" onclick="switchUser()">Switch user</button>
    </div>
    <div class="top-header">
      <h1>PREP</h1>
      <p>Study tracker · 2018–2025 · 10 questions per session</p>
      <div class="user-greeting" id="userGreeting"></div>
      <br>
      <button class="reset-btn" id="resetBtn">Reset my progress</button>
    </div>
    <div class="global-stats">
      <div class="stat-card"><div class="stat-label">Total questions</div><div class="stat-value">2,096</div></div>
      <div class="stat-card"><div class="stat-label">Sessions done</div><div class="stat-value" id="gDone">0</div></div>
      <div class="stat-card"><div class="stat-label">Questions done</div><div class="stat-value" id="gQ">0</div></div>
      <div class="stat-card"><div class="stat-label">Progress</div><div class="stat-value" id="gPct">0%</div></div>
    </div>
    <div id="yearsContainer"></div>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyBIavdFrhmvBx_T0Q7EVxmLECo-TwnjvM8",
  authDomain: "prep-tracker-c2785.firebaseapp.com",
  projectId: "prep-tracker-c2785",
  storageBucket: "prep-tracker-c2785.firebasestorage.app",
  messagingSenderId: "793647827235",
  appId: "1:793647827235:web:dea0b25f77295e1c0a6496"
});
const db=firebase.firestore();
const PREPS=[{year:2025,total:253},{year:2024,total:267},{year:2023,total:269},{year:2022,total:247},{year:2021,total:247},{year:2020,total:245},{year:2019,total:291},{year:2018,total:277}];
const QS=10,GRAND_TOTAL=2096,USER_KEY='prep_username';
let currentUser=null,unsubscribe=null;
const state={};
PREPS.forEach(p=>{const full=Math.floor(p.total/QS),rem=p.total%QS,total=rem>0?full+1:full;state[p.year]={full,rem,total,qtotal:p.total,checked:Array(total).fill(false)};});
function setSyncStatus(s,text){document.getElementById('syncDot').className='sync-dot '+s;document.getElementById('syncText').textContent=text;}
const container=document.getElementById('yearsContainer');
PREPS.forEach(p=>{
  const y=p.year,s=state[y],ycard=document.createElement('div');
  ycard.className='year-card';ycard.id='yr-'+y;
  let html='';
  for(let i=0;i<s.total;i++){const start=i*QS+1,isLast=i===s.total-1&&s.rem>0,end=isLast?p.total:(i+1)*QS,qc=isLast?s.rem:QS;html+=`<div class="session-item${isLast?' last-session':''}" id="si-${y}-${i}" onclick="toggleSession(${y},${i})"><div class="custom-check"><span class="check-icon" style="display:none">✓</span></div><div><span class="session-label">Session ${i+1}</span><span class="session-sub">Q${start}–Q${end}${isLast?' ('+qc+'q)':''}</span></div></div>`;}
  const remNote=s.rem>0?`<p class="remainder-note">Last session has ${s.rem} questions instead of 10</p>`:'';
  ycard.innerHTML=`<div class="year-header" onclick="toggleYear(${y})"><div class="year-left"><span class="year-title">PREP ${y}</span><span class="year-qtotal">${p.qtotal} questions · ${s.total} sessions</span></div><div class="year-right"><span class="year-badge">0 / ${s.total} sessions</span><span class="chevron">▼</span></div></div><div class="pbar-wrap"><div class="pbar" style="width:0%"></div></div><div class="sessions-container" id="sc-${y}"><div class="sessions-grid">${html}</div>${remNote}</div>`;
  container.appendChild(ycard);
});
function handleLogin(){
  const raw=document.getElementById('nameInput').value.trim();
  if(!raw){document.getElementById('loginError').textContent='Please enter your name.';return;}
  const name=raw.charAt(0).toUpperCase()+raw.slice(1).toLowerCase();
  document.getElementById('loginError').textContent='';
  startSession(name);
}
document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin();});
function switchUser(){
  if(unsubscribe){unsubscribe();unsubscribe=null;}
  localStorage.removeItem(USER_KEY);currentUser=null;
  document.getElementById('mainApp').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('nameInput').value='';
}
function startSession(name){
  currentUser=name;localStorage.setItem(USER_KEY,name);
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  document.getElementById('userGreeting').textContent='👋 '+name;
  document.getElementById('loadingOverlay').style.display='flex';
  document.getElementById('loadingOverlay').classList.remove('hidden');
  const docRef=db.collection('users').doc(name);
  docRef.get().then(doc=>{
    applyData(doc.exists?doc.data():null);
    document.getElementById('loadingOverlay').classList.add('hidden');
    setTimeout(()=>{document.getElementById('loadingOverlay').style.display='none';},350);
    setSyncStatus('synced','Synced · '+name);
    if(unsubscribe)unsubscribe();
    unsubscribe=docRef.onSnapshot(snap=>{if(snap.exists){applyData(snap.data());setSyncStatus('synced','Synced · '+name);}});
  }).catch(()=>{document.getElementById('loadingOverlay').classList.add('hidden');setSyncStatus('error','Could not connect');});
  document.getElementById('resetBtn').onclick=()=>{
    if(!confirm('Reset ALL your progress, '+name+'? Cannot be undone.'))return;
    docRef.delete().then(()=>{PREPS.forEach(p=>{state[p.year].checked=Array(state[p.year].total).fill(false);});PREPS.forEach(p=>refreshYear(p.year));updateGlobal();setSyncStatus('synced','Synced · '+name);});
  };
}
function applyData(data){PREPS.forEach(p=>{const s=state[p.year];s.checked=data&&data[p.year]?Array(s.total).fill(false).map((_,i)=>data[p.year][i]||false):Array(s.total).fill(false);refreshYear(p.year);});updateGlobal();}
function updateGlobal(){let ds=0,dq=0;PREPS.forEach(p=>{const s=state[p.year];s.checked.forEach((c,i)=>{if(c){ds++;dq+=(i===s.total-1&&s.rem>0)?s.rem:QS;}});});document.getElementById('gDone').textContent=ds;document.getElementById('gQ').textContent=dq.toLocaleString();document.getElementById('gPct').textContent=Math.round(dq/GRAND_TOTAL*100)+'%';}
function refreshYear(y){const s=state[y],done=s.checked.filter(Boolean).length,pct=Math.round(done/s.total*100);const badge=document.querySelector('#yr-'+y+' .year-badge');if(badge){badge.textContent=done+' / '+s.total+' sessions';badge.className='year-badge'+(done===s.total?' done':done>0?' going':'');}const pbar=document.querySelector('#yr-'+y+' .pbar');if(pbar)pbar.style.width=pct+'%';for(let i=0;i<s.total;i++){const el=document.getElementById('si-'+y+'-'+i);if(!el)continue;const isLast=s.rem>0&&i===s.total-1;el.className='session-item'+(s.checked[i]?' checked':'')+(isLast?' last-session':'');const ci=el.querySelector('.check-icon');if(ci)ci.style.display=s.checked[i]?'block':'none';const cc=el.querySelector('.custom-check');if(cc){cc.style.background=s.checked[i]?'var(--green)':'var(--surface)';cc.style.borderColor=s.checked[i]?'var(--green)':'var(--border-strong)';}}}
let saveTimeout=null;
function scheduleSave(){setSyncStatus('syncing','Saving…');clearTimeout(saveTimeout);saveTimeout=setTimeout(()=>{const out={};PREPS.forEach(p=>{out[p.year]=state[p.year].checked;});db.collection('users').doc(currentUser).set(out).then(()=>setSyncStatus('synced','Synced · '+currentUser)).catch(()=>setSyncStatus('error','Save failed'));},600);}
function toggleSession(y,i){state[y].checked[i]=!state[y].checked[i];const s=state[y],isLast=s.rem>0&&i===s.total-1;const el=document.getElementById('si-'+y+'-'+i);if(el){el.className='session-item'+(s.checked[i]?' checked':'')+(isLast?' last-session':'');const ci=el.querySelector('.check-icon');if(ci)ci.style.display=s.checked[i]?'block':'none';const cc=el.querySelector('.custom-check');if(cc){cc.style.background=s.checked[i]?'var(--green)':'var(--surface)';cc.style.borderColor=s.checked[i]?'var(--green)':'var(--border-strong)';}}const done=s.checked.filter(Boolean).length;const badge=document.querySelector('#yr-'+y+' .year-badge');if(badge){badge.textContent=done+' / '+s.total+' sessions';badge.className='year-badge'+(done===s.total?' done':done>0?' going':'');}const pbar=document.querySelector('#yr-'+y+' .pbar');if(pbar)pbar.style.width=Math.round(done/s.total*100)+'%';updateGlobal();scheduleSave();}
function toggleYear(y){const cont=document.getElementById('sc-'+y),chev=document.querySelector('#yr-'+y+' .chevron'),open=cont.classList.contains('open');cont.className='sessions-container'+(open?'':' open');if(chev)chev.className='chevron'+(open?'':' open');}
const saved=localStorage.getItem(USER_KEY);
if(saved){document.getElementById('loginScreen').style.display='none';startSession(saved);}
else{document.getElementById('loadingOverlay').classList.add('hidden');setTimeout(()=>{document.getElementById('loadingOverlay').style.display='none';document.getElementById('loginScreen').style.display='flex';},300);}
</script>
</body>
</html>
